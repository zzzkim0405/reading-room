<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>My Book Library</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #111827;
            color: #f9fafb;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 16px 24px;
            background: #0f172a;
            box-shadow: 0 2px 16px rgba(15, 23, 42, 0.25);
        }

        .topbar h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.02em;
            font-weight: 700;
        }

        .search-box {
            flex: 1;
            max-width: 640px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            outline: none;
            font-size: 0.98rem;
        }

        .search-box input::placeholder {
            color: rgba(203, 213, 225, 0.7);
        }

        .main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .sidebar {
            width: 240px;
            background: #1f2937;
            color: white;
            padding: 24px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 18px;
        }

        .menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.06);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .menu a:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateX(2px);
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        iframe {
            flex: 1;
            min-height: 520px;
            width: 100%;
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        @media (max-width: 900px) {
            .main {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 260px;
            }

            .content {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <h1>全站搜尋</h1>
        <div class="search-box">
            <input id="site-search" type="search" placeholder="搜尋閱讀類別或章節名稱..." />
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <h2>📚 My Library</h2>

            <div class="menu">
                <a href="junior.html" target="view">📕 初中閱讀</a>
                <a href="senior.html" target="view">📘 高中閱讀</a>
                <a href="cet4.html" target="view">📗 四級閱讀</a>
                <a href="cet6.html" target="view">📙 六級閱讀</a>
                <a href="kaoyan.html" target="view">📚 考研閱讀</a>
                <a href="toefl.html" target="view">🎓 托福閱讀</a>
                <a href="sat.html" target="view">📝 SAT閱讀</a>
                <a href="words.html" target="view">📖 Words</a>
                <a href="notes.html" target="view">📋 Notes</a>
            </div>
        </div>

        <div class="content">
            <iframe name="view" title="閱讀內容檢視器" loading="lazy" src="content.html"></iframe>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('site-search');
        const menuLinks = Array.from(document.querySelectorAll('.menu a'));

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim().toLowerCase();
            menuLinks.forEach(link => {
                const text = link.textContent.trim().toLowerCase();
                link.style.display = text.includes(query) ? 'block' : 'none';
            });
        });
    </script>
</body>

</html>
